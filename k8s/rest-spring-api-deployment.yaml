apiVersion: apps/v1
kind: Deployment
metadata:
  name: rest-spring-api
  namespace: students
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rest-spring-api
  template:
    metadata:
      labels:
        app: rest-spring-api
    spec:
      containers:
        - name: rest-spring-api
          image: kadhemsellami/rest-spring-api:v1.0.0
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: SERVER_PORT
              value: "8080"
            - name: DB_HOST
              value: postgres
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_DB
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: REDIS_HOST
              value: redis
            - name: REDIS_PORT
              value: "6379"
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 40
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: rest-spring-api
  namespace: students
spec:
  selector:
    app: rest-spring-api
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
  type: NodePort
