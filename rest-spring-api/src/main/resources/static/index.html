<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Students</title>
  <style>
    :root {
      --bg: #f7f4ed;
      --card: #fffdf8;
      --text: #1f2933;
      --accent: #c96f34;
      --border: #eadfcb;
    }

    body {
      margin: 0;
      font-family: "Source Sans 3", "Segoe UI", sans-serif;
      background: radial-gradient(circle at top right, #fff7e6, var(--bg) 40%);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: start center;
      padding: 32px 16px;
    }

    .panel {
      width: min(900px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(31, 41, 51, 0.08);
      overflow: hidden;
    }

    .header {
      padding: 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    h1 {
      margin: 0;
      font-size: 1.4rem;
      letter-spacing: 0.4px;
    }

    button {
      border: 0;
      background: var(--accent);
      color: white;
      border-radius: 10px;
      padding: 10px 16px;
      font-weight: 600;
      cursor: pointer;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th,
    td {
      text-align: left;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }

    th {
      background: #fff7e6;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    #status {
      margin: 14px 16px;
      color: #7b8794;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <section class="panel">
    <div class="header">
      <h1>Students List</h1>
      <button id="reload">Reload</button>
    </div>
    <p id="status">Loading students...</p>
    <table aria-label="Students">
      <thead>
        <tr>
          <th>ID</th>
          <th>CIN</th>
          <th>Name</th>
          <th>Birth Date</th>
        </tr>
      </thead>
      <tbody id="students-body"></tbody>
    </table>
  </section>

  <script>
    const statusElement = document.getElementById('status');
    const tableBody = document.getElementById('students-body');
    const reloadButton = document.getElementById('reload');

    async function loadStudents() {
      statusElement.textContent = 'Loading students...';
      tableBody.innerHTML = '';

      try {
        const response = await fetch('/api/etudiants');
        if (!response.ok) {
          throw new Error('HTTP ' + response.status);
        }

        const students = await response.json();
        if (!Array.isArray(students) || students.length === 0) {
          statusElement.textContent = 'No students found.';
          return;
        }

        students.forEach((student) => {
          const row = document.createElement('tr');
          row.innerHTML = `
            <td>${student.id ?? ''}</td>
            <td>${student.cin ?? ''}</td>
            <td>${student.nom ?? ''}</td>
            <td>${student.dateNaissance ?? ''}</td>
          `;
          tableBody.appendChild(row);
        });

        statusElement.textContent = `Loaded ${students.length} students.`;
      } catch (error) {
        statusElement.textContent = 'Unable to load students: ' + error.message;
      }
    }

    reloadButton.addEventListener('click', loadStudents);
    loadStudents();
  </script>
</body>
</html>
