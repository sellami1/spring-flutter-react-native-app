<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Students & Departments Admin</title>
  <style>
    :root {
      --bg: #f7f4ed;
      --card: #fffdf8;
      --text: #1f2933;
      --accent: #c96f34;
      --accent-2: #2f855a;
      --danger: #b83232;
      --border: #eadfcb;
    }

    body {
      margin: 0;
      font-family: "Source Sans 3", "Segoe UI", sans-serif;
      background: radial-gradient(circle at top right, #fff7e6, var(--bg) 40%);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: start center;
      padding: 32px 16px;
    }

    .panel {
      width: min(900px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(31, 41, 51, 0.08);
      overflow: hidden;
    }

    .content {
      display: grid;
      grid-template-columns: 1fr;
      gap: 28px;
      padding: 20px;
    }

    .section {
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      background: #fff;
    }

    .section-head {
      padding: 14px 16px;
      background: #fff7e6;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .section h2 {
      margin: 0;
      font-size: 1.05rem;
    }

    .body {
      padding: 14px;
    }

    form {
      display: grid;
      gap: 10px;
      margin-bottom: 12px;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #d9ccb3;
      border-radius: 9px;
      padding: 10px;
      font-size: 0.95rem;
      background: #fffdf9;
    }

    .header {
      padding: 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    h1 {
      margin: 0;
      font-size: 1.4rem;
      letter-spacing: 0.4px;
    }

    button {
      border: 0;
      background: var(--accent);
      color: white;
      border-radius: 10px;
      padding: 10px 16px;
      font-weight: 600;
      cursor: pointer;
    }

    .button-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .button-muted {
      background: #6b7280;
    }

    .button-success {
      background: var(--accent-2);
    }

    .button-danger {
      background: var(--danger);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 8px;
    }

    th,
    td {
      text-align: left;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }

    th {
      background: #fff7e6;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    .actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .actions button {
      font-size: 0.8rem;
      border-radius: 8px;
      padding: 7px 10px;
    }

    #status {
      margin: 14px 16px;
      color: #7b8794;
      font-size: 0.95rem;
    }

    @media (max-width: 700px) {
      .grid-2 {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <section class="panel">
    <div class="header">
      <h1>Students & Departments</h1>
      <div class="button-row">
        <button id="reload">Reload All</button>
      </div>
    </div>
    <p id="status">Loading data...</p>

    <div class="content">
      <section class="section" aria-label="Students Section">
        <div class="section-head">
          <h2>Students</h2>
          <button id="clear-student-form" class="button-muted">Clear Student Form</button>
        </div>
        <div class="body">
          <form id="student-form">
            <input type="hidden" id="student-id" />
            <div class="grid-2">
              <input id="student-cin" name="cin" placeholder="CIN" required />
              <input id="student-nom" name="nom" placeholder="Name" required />
            </div>
            <div class="grid-2">
              <input id="student-date" name="dateNaissance" type="date" required />
              <input id="student-year" name="anneePremiereInscription" type="number" placeholder="First inscription year" required />
            </div>
            <div class="button-row">
              <button type="submit" class="button-success">Save Student</button>
            </div>
          </form>

          <table aria-label="Students">
            <thead>
              <tr>
                <th>ID</th>
                <th>CIN</th>
                <th>Name</th>
                <th>Birth Date</th>
                <th>1st Year</th>
                <th>Age</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="students-body"></tbody>
          </table>
        </div>
      </section>

      <section class="section" aria-label="Departments Section">
        <div class="section-head">
          <h2>Departments</h2>
          <button id="clear-departement-form" class="button-muted">Clear Department Form</button>
        </div>
        <div class="body">
          <form id="departement-form">
            <input type="hidden" id="departement-id" />
            <div class="grid-2">
              <input id="departement-nom" name="nom" placeholder="Department name" required />
              <div></div>
            </div>
            <div class="button-row">
              <button type="submit" class="button-success">Save Department</button>
            </div>
          </form>

          <table aria-label="Departments">
            <thead>
              <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="departements-body"></tbody>
          </table>
        </div>
      </section>
    </div>
  </section>

  <script>
    const statusElement = document.getElementById('status');
    const tableBody = document.getElementById('students-body');
    const departementsBody = document.getElementById('departements-body');
    const reloadButton = document.getElementById('reload');

    const studentForm = document.getElementById('student-form');
    const studentIdInput = document.getElementById('student-id');
    const studentCinInput = document.getElementById('student-cin');
    const studentNomInput = document.getElementById('student-nom');
    const studentDateInput = document.getElementById('student-date');
    const studentYearInput = document.getElementById('student-year');

    const departementForm = document.getElementById('departement-form');
    const departementIdInput = document.getElementById('departement-id');
    const departementNomInput = document.getElementById('departement-nom');

    const clearStudentFormButton = document.getElementById('clear-student-form');
    const clearDepartementFormButton = document.getElementById('clear-departement-form');

    function setStatus(message) {
      statusElement.textContent = message;
    }

    async function apiRequest(url, options = {}) {
      const response = await fetch(url, {
        headers: {
          'Content-Type': 'application/json',
          ...(options.headers || {}),
        },
        ...options,
      });

      if (!response.ok) {
        let errorText = 'HTTP ' + response.status;
        try {
          const err = await response.json();
          if (err && err.message) {
            errorText = err.message;
          }
        } catch (_) {
          // Ignore JSON parsing failures and keep default message.
        }
        throw new Error(errorText);
      }

      if (response.status === 204) {
        return null;
      }

      return response.json();
    }

    function resetStudentForm() {
      studentIdInput.value = '';
      studentCinInput.value = '';
      studentNomInput.value = '';
      studentDateInput.value = '';
      studentYearInput.value = '';
    }

    function resetDepartementForm() {
      departementIdInput.value = '';
      departementNomInput.value = '';
    }

    async function loadStudents() {
      setStatus('Loading students...');
      tableBody.innerHTML = '';

      const students = await apiRequest('/api/etudiants');

      if (!Array.isArray(students) || students.length === 0) {
        return 0;
      }

      students.forEach((student) => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${student.id ?? ''}</td>
          <td>${student.cin ?? ''}</td>
          <td>${student.nom ?? ''}</td>
          <td>${student.dateNaissance ?? ''}</td>
          <td>${student.anneePremiereInscription ?? ''}</td>
          <td>${student.age ?? ''}</td>
          <td class="actions">
            <button class="button-muted" data-action="edit" data-id="${student.id}">Edit</button>
            <button class="button-danger" data-action="delete" data-id="${student.id}">Delete</button>
          </td>
        `;
        row.querySelector('[data-action="edit"]').addEventListener('click', () => {
          studentIdInput.value = student.id || '';
          studentCinInput.value = student.cin || '';
          studentNomInput.value = student.nom || '';
          studentDateInput.value = student.dateNaissance || '';
          studentYearInput.value = student.anneePremiereInscription || '';
          setStatus('Student loaded in form for update.');
        });

        row.querySelector('[data-action="delete"]').addEventListener('click', async () => {
          if (!confirm('Delete this student?')) {
            return;
          }
          try {
            await apiRequest('/api/etudiants/' + student.id, { method: 'DELETE' });
            setStatus('Student deleted.');
            await loadAll();
          } catch (error) {
            setStatus('Unable to delete student: ' + error.message);
          }
        });

        tableBody.appendChild(row);
      });

      return students.length;
    }

    async function loadDepartements() {
      departementsBody.innerHTML = '';
      const departements = await apiRequest('/api/departements');

      if (!Array.isArray(departements) || departements.length === 0) {
        return 0;
      }

      departements.forEach((departement) => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${departement.id ?? ''}</td>
          <td>${departement.nom ?? ''}</td>
          <td class="actions">
            <button class="button-muted" data-action="edit" data-id="${departement.id}">Edit</button>
            <button class="button-danger" data-action="delete" data-id="${departement.id}">Delete</button>
          </td>
        `;

        row.querySelector('[data-action="edit"]').addEventListener('click', () => {
          departementIdInput.value = departement.id || '';
          departementNomInput.value = departement.nom || '';
          setStatus('Department loaded in form for update.');
        });

        row.querySelector('[data-action="delete"]').addEventListener('click', async () => {
          if (!confirm('Delete this department?')) {
            return;
          }
          try {
            await apiRequest('/api/departements/' + departement.id, { method: 'DELETE' });
            setStatus('Department deleted.');
            await loadAll();
          } catch (error) {
            setStatus('Unable to delete department: ' + error.message);
          }
        });

        departementsBody.appendChild(row);
      });

      return departements.length;
    }

    async function loadAll() {
      setStatus('Loading students and departments...');
      try {
        const studentsCount = await loadStudents();
        const departementsCount = await loadDepartements();
        setStatus('Loaded ' + studentsCount + ' students and ' + departementsCount + ' departments.');
      } catch (error) {
        setStatus('Unable to load data: ' + error.message);
      }
    }

    studentForm.addEventListener('submit', async (event) => {
      event.preventDefault();
      const id = studentIdInput.value.trim();
      const payload = {
        cin: studentCinInput.value.trim(),
        nom: studentNomInput.value.trim(),
        dateNaissance: studentDateInput.value,
        anneePremiereInscription: Number(studentYearInput.value),
      };

      try {
        if (id) {
          await apiRequest('/api/etudiants/' + id, {
            method: 'PUT',
            body: JSON.stringify(payload),
          });
          setStatus('Student updated.');
        } else {
          await apiRequest('/api/etudiants', {
            method: 'POST',
            body: JSON.stringify(payload),
          });
          setStatus('Student created.');
        }
        resetStudentForm();
        await loadAll();
      } catch (error) {
        setStatus('Unable to save student: ' + error.message);
      }
    });

    departementForm.addEventListener('submit', async (event) => {
      event.preventDefault();
      const id = departementIdInput.value.trim();
      const payload = {
        nom: departementNomInput.value.trim(),
      };

      try {
        if (id) {
          await apiRequest('/api/departements/' + id, {
            method: 'PUT',
            body: JSON.stringify(payload),
          });
          setStatus('Department updated.');
        } else {
          await apiRequest('/api/departements', {
            method: 'POST',
            body: JSON.stringify(payload),
          });
          setStatus('Department created.');
        }
        resetDepartementForm();
        await loadAll();
      } catch (error) {
        setStatus('Unable to save department: ' + error.message);
      }
    });

    clearStudentFormButton.addEventListener('click', resetStudentForm);
    clearDepartementFormButton.addEventListener('click', resetDepartementForm);
    reloadButton.addEventListener('click', loadAll);
    loadAll();
  </script>
</body>
</html>
