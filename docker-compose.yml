services:
    postgres:
        image: 'postgres:16-alpine'
        container_name: students-postgres
        environment:
            POSTGRES_DB: students_db
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
        ports:
            - '5433:5432'
        volumes:
            - 'postgres16_data:/var/lib/postgresql/data'
        healthcheck:
            test:
                - CMD-SHELL
                - pg_isready -U postgres -d students_db
            interval: 10s
            timeout: 5s
            retries: 5
    redis:
        image: 'redis:7-alpine'
        container_name: students-redis
        ports:
            - '6379:6379'
        healthcheck:
            test:
                - CMD
                - redis-cli
                - ping
            interval: 10s
            timeout: 5s
            retries: 5
    rest-spring-api:
        build:
            context: ./rest-spring-api
            dockerfile: Dockerfile
        container_name: students-rest-spring-api
        environment:
            SERVER_PORT: 8080
            DB_HOST: postgres
            DB_PORT: 5432
            DB_NAME: students_db
            DB_USERNAME: postgres
            DB_PASSWORD: postgres
            REDIS_HOST: redis
            REDIS_PORT: 6379
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_healthy
        ports:
            - '8080:8080'
volumes:
    postgres_data: null
    postgres16_data: null
